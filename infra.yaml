services:
  postgres:
    image: postgres:17-alpine
    container_name: produto-postgres
    environment:
      POSTGRES_DB: produto_db
      POSTGRES_USER: produto_user
      POSTGRES_PASSWORD: produto_pass
    ports:
      - "5432:5432"
    volumes:
      - produto_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U produto_user -d produto_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - produto-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: crud-produto:latest
    container_name: crud-produto-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      DB_URL: jdbc:postgresql://postgres:5432/produto_db
      DB_USERNAME: produto_user
      DB_PASSWORD: produto_pass
      DDL_AUTO: update
      SHOW_SQL: "false"
    ports:
      - "8080:8080"
    restart: unless-stopped
    networks:
      - produto-network

volumes:
  produto_postgres_data:

networks:
  produto-network:
    driver: bridge
