apiVersion: apps/v1
kind: Deployment
metadata:
  name: crud-produto-app
  namespace: estudo-jenkins
spec:
  replicas: 2
  selector:
    matchLabels:
      app: crud-produto-app
  template:
    metadata:
      labels:
        app: crud-produto-app
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres-service 5432; do
                echo "Aguardando PostgreSQL..."
                sleep 2
              done
      containers:
        - name: crud-produto-app
          image: crud-produto:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: SERVER_PORT
              valueFrom:
                configMapKeyRef:
                  name: crud-produto-config
                  key: SERVER_PORT
            - name: DB_URL
              valueFrom:
                configMapKeyRef:
                  name: crud-produto-config
                  key: DB_URL
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: DDL_AUTO
              valueFrom:
                configMapKeyRef:
                  name: crud-produto-config
                  key: DDL_AUTO
            - name: SHOW_SQL
              valueFrom:
                configMapKeyRef:
                  name: crud-produto-config
                  key: SHOW_SQL
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            periodSeconds: 20
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: crud-produto-service
  namespace: estudo-jenkins
spec:
  type: NodePort
  selector:
    app: crud-produto-app
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30080
