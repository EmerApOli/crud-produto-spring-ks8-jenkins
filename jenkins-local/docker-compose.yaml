services:
  jenkins:
    build: .
    container_name: jenkins-local
    restart: unless-stopped
    user: root
    ports:
      - "8085:8080"
      - "50084:50000"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      # Linux: usa $HOME/.kube/config por padrão e exige que seja um arquivo existente.
      - type: bind
        source: ${KUBE_CONFIG_PATH:-${HOME}/.kube/config}
        target: /var/jenkins_home/.kube/config
        read_only: true
        bind:
          create_host_path: false
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  jenkins_home:
