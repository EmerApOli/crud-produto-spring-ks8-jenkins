spring:
  application:
    name: crud-produto

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/produto_db}
    username: ${DB_USERNAME:produto_user}
    password: ${DB_PASSWORD:produto_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: ${SHOW_SQL:false}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
